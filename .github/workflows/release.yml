name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  actions: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          pnpm -r exec -- npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Build packages
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Setup npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" >> .npmrc

      - name: Publish to npm
        run: |
          for pkg in packages/*/; do
            (cd "$pkg" && npm publish --access public) || true
          done

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish to NuGet
        run: |
          for proj in dotnet/Aspectly.Bridge/Aspectly.Bridge.csproj dotnet/Aspectly.Bridge.CefSharp/Aspectly.Bridge.CefSharp.csproj dotnet/Aspectly.Bridge.WebView2/Aspectly.Bridge.WebView2.csproj; do
            dotnet pack "$proj" -c Release /p:Version="${VERSION}" /p:EnableWindowsTargeting=true -o ./nupkgs || true
          done
          dotnet nuget push ./nupkgs/*.nupkg --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/*/package.json apps/landing/package.json examples/*/package.json
          git commit -m "chore: bump version to v${VERSION}" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin main

      - name: Trigger landing page deploy
        run: gh workflow run deploy-landing.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
