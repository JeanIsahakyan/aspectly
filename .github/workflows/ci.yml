name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # .NET packages build and test
  dotnet:
    name: .NET Build & Test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Aspectly.Bridge
        run: dotnet restore dotnet/Aspectly.Bridge/Aspectly.Bridge.csproj

      - name: Build Aspectly.Bridge
        run: dotnet build dotnet/Aspectly.Bridge/Aspectly.Bridge.csproj -c Release --no-restore

      - name: Restore Aspectly.Bridge.CefSharp
        run: dotnet restore dotnet/Aspectly.Bridge.CefSharp/Aspectly.Bridge.CefSharp.csproj

      - name: Build Aspectly.Bridge.CefSharp
        run: dotnet build dotnet/Aspectly.Bridge.CefSharp/Aspectly.Bridge.CefSharp.csproj -c Release --no-restore

      - name: Restore & Run Tests
        run: |
          dotnet restore dotnet/Aspectly.Bridge.Tests/Aspectly.Bridge.Tests.csproj
          dotnet test dotnet/Aspectly.Bridge.Tests/Aspectly.Bridge.Tests.csproj -c Release --verbosity normal

      - name: Build Example (CefSharp)
        run: |
          dotnet restore examples/dotnet/Aspectly.Bridge.Example.CefSharp.csproj
          dotnet build examples/dotnet/Aspectly.Bridge.Example.CefSharp.csproj -c Release --no-restore

  # Node.js packages build and test
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test

  test-coverage:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
          fail_ci_if_error: false
